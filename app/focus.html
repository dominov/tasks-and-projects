<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nokia Personal Task Management - Focus Premium</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
    }
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 flex flex-col h-screen overflow-hidden select-none">

  <!-- BARRA DE TÍTULO (Estilo Electron) -->
  <div class="h-9 bg-slate-950 flex items-center justify-between px-3 border-b border-slate-800 text-xs text-slate-400 shrink-0">
    <div class="flex items-center space-x-4">
      <span class="font-bold text-amber-500 flex items-center gap-1">
        <i data-lucide="crown" class="w-4 h-4"></i>
      </span>
      <div class="flex space-x-3">
        <span class="hover:text-slate-200 cursor-pointer">File</span>
        <span class="hover:text-slate-200 cursor-pointer">Edit</span>
        <span class="hover:text-slate-200 cursor-pointer">View</span>
        <span class="hover:text-slate-200 cursor-pointer">Window</span>
      </div>
    </div>
    <div class="text-slate-400 font-medium">Personal Task Management</div>
    <div class="flex items-center space-x-3">
      <button class="hover:text-slate-200"><i data-lucide="minus" class="w-3.5 h-3.5"></i></button>
      <button class="hover:text-slate-200"><i data-lucide="square" class="w-3 h-3"></i></button>
      <button class="hover:text-rose-500"><i data-lucide="x" class="w-4 h-4"></i></button>
    </div>
  </div>

  <!-- CONTENEDOR PRINCIPAL -->
  <div class="flex flex-1 overflow-hidden">

    <!-- MENÚ LATERAL IZQUIERDO -->
    <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col justify-between overflow-y-auto shrink-0">
      <div class="p-4 space-y-6">
        
        <!-- Navegación Principal -->
        <nav class="space-y-1">
          <!-- Botón Focus Activo -->
          <button class="w-full flex items-center gap-3 px-3 py-2 rounded-lg bg-blue-600/10 border border-blue-500/20 text-blue-400 transition text-left text-sm font-semibold">
            <i data-lucide="zap" class="w-4 h-4 text-blue-400"></i> Focus Mode
          </button>
          <button class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 transition text-left text-sm font-medium">
            <i data-lucide="check-square" class="w-4 h-4"></i> My Tasks
          </button>
          <button class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 transition text-left text-sm font-medium">
            <i data-lucide="target" class="w-4 h-4"></i> Goals
          </button>
          <button class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 transition text-left text-sm font-medium">
            <i data-lucide="calendar" class="w-4 h-4"></i> Calendar
          </button>
        </nav>

        <!-- Filtros Rápidos de Proyectos -->
        <div class="space-y-2">
          <div class="px-3 text-[10px] font-bold text-slate-500 uppercase tracking-wider">Proyectos Activos</div>
          <div class="space-y-1">
            <div class="flex items-center gap-2 px-3 py-1.5 text-xs text-slate-300">
              <span class="w-2.5 h-2.5 rounded-full bg-indigo-500"></span> NETSALES / OI
            </div>
            <div class="flex items-center gap-2 px-3 py-1.5 text-xs text-slate-300">
              <span class="w-2.5 h-2.5 rounded-full bg-blue-500"></span> MI Combo
            </div>
            <div class="flex items-center gap-2 px-3 py-1.5 text-xs text-slate-300">
              <span class="w-2.5 h-2.5 rounded-full bg-emerald-500"></span> Combo NETSALES
            </div>
          </div>
        </div>
      </div>

      <!-- Footer Perfil -->
      <div class="p-4 border-t border-slate-800 bg-slate-950/40 flex items-center justify-between text-xs text-slate-400">
        <div class="flex items-center gap-2">
          <div class="w-7 h-7 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-600 flex items-center justify-center font-bold text-white text-[10px]">
            TPM
          </div>
          <div>
            <p class="font-medium text-slate-200">Nokia TPM</p>
            <p class="text-[10px] text-slate-500">v1.4.0</p>
          </div>
        </div>
        <button class="hover:text-slate-200 transition"><i data-lucide="settings" class="w-4 h-4"></i></button>
      </div>
    </aside>

    <!-- ÁREA DE ENFOQUE CENTRAL -->
    <main class="flex-1 bg-slate-50 text-slate-800 flex flex-col overflow-hidden">
      
      <!-- Cabecera de Enfoque -->
      <header class="p-6 bg-white border-b border-slate-200 flex items-center justify-between shrink-0 shadow-sm">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 rounded-xl bg-amber-500/10 flex items-center justify-center text-amber-600 border border-amber-500/20 shadow-sm">
            <i data-lucide="zap" class="w-6 h-6 animate-pulse"></i>
          </div>
          <div>
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Mi Día de Trabajo</h1>
            <p class="text-xs text-slate-500 mt-0.5 flex items-center gap-1.5">
              <i data-lucide="calendar" class="w-3.5 h-3.5 text-blue-600"></i> Viernes, 29 de Mayo de 2026
            </p>
          </div>
        </div>
        
        <div class="flex items-center gap-3">
          <span class="text-xs text-slate-400 font-medium">Ordenar por:</span>
          <select id="focus-sort" onchange="renderFocusView()" class="bg-slate-100 border border-slate-200 rounded-lg text-xs px-3 py-1.5 text-slate-700 font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500/20 transition cursor-pointer">
            <option value="priority">Prioridad</option>
            <option value="project">Proyecto</option>
            <option value="points">Story Points</option>
          </select>
        </div>
      </header>

      <!-- Panel de Contenido de Scroll -->
      <div class="flex-1 overflow-y-auto p-6 space-y-6">

        <!-- ============================================== -->
        <!-- SECCIÓN SUPERIOR: AHORA MISMO (IN PROGRESS) -->
        <!-- ============================================== -->
        <section class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-2">
              <span class="relative flex h-3 w-3">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
              </span>
              <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest font-mono">Trabajando ahora (Máximo 3)</h2>
            </div>
            <span class="text-xs font-semibold text-emerald-600 bg-emerald-50 px-2.5 py-1 rounded-full border border-emerald-100" id="in-progress-counter">0 Activas</span>
          </div>

          <!-- Grid de Tareas Activas -->
          <div id="in-progress-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- Renderizado dinámico desde JS -->
          </div>
        </section>

        <!-- ============================================== -->
        <!-- SECCIÓN INFERIOR: DISTRIBUCIÓN Y DESPACHO (2 COLS) -->
        <!-- ============================================== -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

          <!-- COLUMNA IZQUIERDA: COLA DE HOY (65%) -->
          <div class="lg:col-span-2 bg-white rounded-2xl border border-slate-200 p-6 shadow-sm flex flex-col min-h-[350px]">
            <div class="flex items-center justify-between mb-4 pb-3 border-b border-slate-100">
              <h3 class="font-bold text-slate-900 text-sm flex items-center gap-2">
                <i data-lucide="list-todo" class="w-4.5 h-4.5 text-blue-600"></i> Planificado para Hoy
              </h3>
              <span class="text-xs font-semibold text-slate-500 bg-slate-100 px-2.5 py-0.5 rounded-full" id="todo-counter">0 Pendientes</span>
            </div>

            <!-- Listado de Tareas Planificadas para Hoy -->
            <div id="todo-list" class="space-y-3 flex-1">
              <!-- Renderizado dinámico desde JS -->
            </div>
          </div>

          <!-- COLUMNA DERECHA: DESPACHO ATRASADAS (35%) -->
          <div class="bg-white rounded-2xl border-t-4 border-t-red-500 border border-slate-200 p-6 shadow-sm flex flex-col min-h-[350px]">
            <div class="flex items-center justify-between mb-4 pb-3 border-b border-slate-100">
              <h3 class="font-bold text-red-700 text-sm flex items-center gap-2">
                <i data-lucide="alert-circle" class="w-4.5 h-4.5 text-red-600"></i> Despacho de Atrasadas
              </h3>
              <span class="text-xs font-semibold text-red-600 bg-red-50 px-2.5 py-0.5 rounded-full border border-red-100" id="overdue-counter">0 Atrasadas</span>
            </div>

            <!-- Listado de Tareas Atrasadas con Acciones de Decisión -->
            <div id="overdue-list" class="space-y-3 flex-1">
              <!-- Renderizado dinámico desde JS -->
            </div>
          </div>

        </div>

      </div>
    </main>

  </div>

  <!-- SISTEMA DE NOTIFICACIONES TOAST (No Alerts) -->
  <div id="toast-container" class="fixed bottom-5 right-5 z-50 space-y-2 pointer-events-none"></div>

  <!-- CONTROLADOR DE JAVASCRIPT -->
  <script>
    // FUENTE DE DATOS UNIFICADA
    let tasks = [
      { id: 1, title: "RUN Current Period", project: "Combo NETSALES", category: "Reporting", priority: "High", points: 1, status: "todo", dueDate: "2026-05-29", delayDays: 0 },
      { id: 2, title: "Configurar Dataset de ZINA para recibir datos externos", project: "MI Combo", category: "Development", priority: "High", points: 1, status: "progress", dueDate: "2026-05-29", delayDays: 0 },
      { id: 3, title: "Hacer el envío desde Wars a ZINA bi para la actualizacion de la informacion", project: "MI Combo", category: "Reporting", priority: "Medium", points: 1, status: "progress", dueDate: "2026-05-29", delayDays: 0 },
      { id: 4, title: "Procesar los datos de la base de datos para generar template", project: "MI Combo", category: "Development", priority: "High", points: 1, status: "todo", dueDate: "2026-05-27", delayDays: 2 },
      { id: 5, title: "Crear opcion en el admin para hacer la sincronizacion de manera manual", project: "MI Combo", category: "Development", priority: "Medium", points: 1, status: "todo", dueDate: "2026-05-28", delayDays: 1 }
    ];

    // Paleta de colores de proyectos consistentes
    const projectColors = {
      "Combo NETSALES": "bg-emerald-500",
      "MI Combo": "bg-blue-600",
      "NETSALES / OI": "bg-indigo-600",
      "Risk And Upside": "bg-pink-600",
      "Combo Actuals": "bg-amber-600"
    };

    window.onload = function() {
      lucide.createIcons();
      renderFocusView();
    };

    // RENDERIZADO DINÁMICO DE LA VISTA
    function renderFocusView() {
      const sortCriteria = document.getElementById('focus-sort').value;
      const todayStr = "2026-05-29";

      // Ordenar copia de las tareas
      let sortedTasks = [...tasks];
      if (sortCriteria === 'priority') {
        const pValues = { "High": 3, "Medium": 2, "Low": 1 };
        sortedTasks.sort((a, b) => pValues[b.priority] - pValues[a.priority]);
      } else if (sortCriteria === 'project') {
        sortedTasks.sort((a, b) => a.project.localeCompare(b.project));
      } else if (sortCriteria === 'points') {
        sortedTasks.sort((a, b) => b.points - a.points);
      }

      // Clasificación de tareas
      const inProgress = sortedTasks.filter(t => t.status === 'progress' && t.dueDate === todayStr);
      const todoToday = sortedTasks.filter(t => t.status === 'todo' && t.dueDate === todayStr);
      const overdue = sortedTasks.filter(t => t.status === 'todo' && t.dueDate < todayStr);

      // Actualizar contadores
      document.getElementById('in-progress-counter').innerText = `${inProgress.length} de 3 Activas`;
      document.getElementById('todo-counter').innerText = `${todoToday.length} Pendientes`;
      document.getElementById('overdue-counter').innerText = `${overdue.length} Atrasadas`;

      // Renderizar In Progress
      const inProgressGrid = document.getElementById('in-progress-grid');
      inProgressGrid.innerHTML = '';
      if (inProgress.length === 0) {
        inProgressGrid.innerHTML = `
          <div class="col-span-full text-center py-6 text-slate-400 border border-dashed border-slate-200 rounded-xl bg-slate-50/50 text-xs">
            No tienes tareas activas ahora mismo. Selecciona una tarea de la cola de abajo e inicia tu jornada.
          </div>
        `;
      } else {
        inProgress.forEach(task => {
          const colHex = projectColors[task.project] || 'bg-slate-600';
          inProgressGrid.innerHTML += `
            <div class="bg-white p-5 rounded-xl border-2 border-emerald-500 shadow-md flex flex-col justify-between space-y-4 relative overflow-hidden group">
              <div>
                <div class="flex items-start justify-between gap-2">
                  <h4 class="text-base font-extrabold text-slate-900 leading-tight tracking-tight group-hover:text-emerald-700 transition">${task.title}</h4>
                  <span class="font-bold text-xs text-slate-800 bg-slate-100 px-2 py-0.5 rounded-md border border-slate-200 shrink-0">${task.points} SP</span>
                </div>
                <div class="flex items-center gap-2 mt-3 flex-wrap">
                  <span class="font-bold text-[10px] px-2 py-0.5 rounded text-white ${colHex}">${task.project}</span>
                  <span class="text-[10px] bg-slate-100 text-slate-600 px-2 py-0.5 rounded border border-slate-200 font-medium flex items-center gap-1">
                    <i data-lucide="folder" class="w-3 h-3 text-slate-400"></i> ${task.category}
                  </span>
                </div>
              </div>
              <button onclick="completeTask(${task.id})" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-xs py-2 rounded-lg transition shadow-sm flex items-center justify-center gap-1.5">
                <i data-lucide="check-circle" class="w-4 h-4"></i> Marcar Completada
              </button>
            </div>
          `;
        });
      }

      // Renderizar To Do Hoy
      const todoList = document.getElementById('todo-list');
      todoList.innerHTML = '';
      if (todoToday.length === 0) {
        todoList.innerHTML = `
          <div class="text-center py-12 text-slate-400 text-xs border border-dashed border-slate-200 rounded-xl bg-slate-50/50">
            Felicidades, no tienes más tareas agendadas para hoy en tu cola.
          </div>
        `;
      } else {
        todoToday.forEach(task => {
          const colHex = projectColors[task.project] || 'bg-slate-600';
          todoList.innerHTML += `
            <div class="bg-slate-50/50 hover:bg-white p-4 rounded-xl border border-slate-200/80 hover:border-slate-300 hover:shadow-sm transition flex flex-col sm:flex-row sm:items-center justify-between gap-4">
              <div class="space-y-1">
                <h4 class="font-bold text-slate-900 text-sm leading-snug">${task.title}</h4>
                <div class="flex items-center gap-2 flex-wrap text-[10px]">
                  <span class="font-bold text-[9px] px-1.5 py-0.5 rounded text-white ${colHex}">${task.project}</span>
                  <span class="text-slate-500 font-medium">• ${task.category}</span>
                  <span class="text-slate-400">• SP: ${task.points}</span>
                </div>
              </div>
              <button onclick="startTask(${task.id})" class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs px-4 py-2 rounded-lg transition shadow-sm flex items-center gap-1.5 self-start sm:self-auto">
                <i data-lucide="play" class="w-3.5 h-3.5 fill-current"></i> Iniciar
              </button>
            </div>
          `;
        });
      }

      // Renderizar Atrasadas
      const overdueList = document.getElementById('overdue-list');
      overdueList.innerHTML = '';
      if (overdue.length === 0) {
        overdueList.innerHTML = `
          <div class="text-center py-12 text-slate-400 text-xs border border-dashed border-slate-200 rounded-xl bg-slate-50/50">
            ¡Día limpio! No tienes tareas retrasadas del pasado.
          </div>
        `;
      } else {
        overdue.forEach(task => {
          const colHex = projectColors[task.project] || 'bg-slate-600';
          const dayName = task.delayDays === 1 ? "Ayer" : `Hace ${task.delayDays} días`;
          overdueList.innerHTML += `
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm space-y-3">
              <div class="space-y-1">
                <div class="flex items-start justify-between gap-2">
                  <h4 class="font-bold text-slate-900 text-xs leading-snug">${task.title}</h4>
                  <span class="text-[9px] bg-red-50 text-red-600 font-extrabold px-2 py-0.5 rounded-full border border-red-100 shrink-0">${dayName}</span>
                </div>
                <div class="flex items-center gap-1.5 text-[9px]">
                  <span class="w-2 h-2 rounded-full ${colHex}"></span>
                  <span class="font-semibold text-slate-500">${task.project}</span>
                </div>
              </div>
              
              <!-- Botones de Acción Directa en la tarjeta -->
              <div class="grid grid-cols-2 gap-2 pt-2 border-t border-slate-100">
                <button onclick="moveToToday(${task.id})" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold text-[11px] py-1.5 rounded-md transition flex items-center justify-center gap-1">
                  <i data-lucide="arrow-up-to-line" class="w-3.5 h-3.5 text-slate-500"></i> Traer a Hoy
                </button>
                <button onclick="moveToTomorrow(${task.id})" class="bg-slate-50 hover:bg-amber-50 text-amber-700 hover:text-amber-800 border border-slate-200 hover:border-amber-200 font-bold text-[11px] py-1.5 rounded-md transition flex items-center justify-center gap-1">
                  <i data-lucide="corner-up-right" class="w-3.5 h-3.5"></i> Posponer Lunes
                </button>
              </div>
            </div>
          `;
        });
      }

      lucide.createIcons();
    }

    // INTERACCIONES Y LÓGICA DE ESTADO
    function startTask(id) {
      const activeCount = tasks.filter(t => t.status === 'progress' && t.dueDate === "2026-05-29").length;
      if (activeCount >= 3) {
        showToast("Límite alcanzado", "Ya tienes 3 tareas activas. Termina una para iniciar otra.", "error");
        return;
      }

      const task = tasks.find(t => t.id === id);
      if (task) {
        task.status = 'progress';
        showToast("Tarea Iniciada", `"${task.title}" ahora está en progreso.`, "success");
        renderFocusView();
      }
    }

    function completeTask(id) {
      const task = tasks.find(t => t.id === id);
      if (task) {
        // Remover de la cola local
        tasks = tasks.filter(t => t.id !== id);
        showToast("¡Buen trabajo!", `Completaste "${task.title}".`, "success");
        renderFocusView();
      }
    }

    function moveToToday(id) {
      const task = tasks.find(t => t.id === id);
      if (task) {
        task.dueDate = "2026-05-29";
        task.delayDays = 0;
        showToast("Planificado para Hoy", `Agregaste "${task.title}" al día de hoy.`, "info");
        renderFocusView();
      }
    }

    function moveToTomorrow(id) {
      const task = tasks.find(t => t.id === id);
      if (task) {
        // Mover al lunes 1 de Junio de 2026 (Siguiente día hábil tras el viernes 29 de mayo)
        task.dueDate = "2026-06-01";
        showToast("Posproscastinado", `"${task.title}" movida al lunes 1 de junio.`, "warning");
        renderFocusView();
      }
    }

    // NOTIFICACIONES TOAST MEJORADAS (Sin alert nativo)
    function showToast(title, message, type = "info") {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      
      let borderCol = "border-slate-800";
      let icon = "info";
      let iconCol = "text-blue-500";
      
      if (type === "success") {
        borderCol = "border-emerald-500";
        icon = "check-circle";
        iconCol = "text-emerald-500";
      } else if (type === "error") {
        borderCol = "border-rose-500";
        icon = "alert-octagon";
        iconCol = "text-rose-500";
      } else if (type === "warning") {
        borderCol = "border-amber-500";
        icon = "calendar-clock";
        iconCol = "text-amber-500";
      }

      toast.className = `bg-slate-900 border-l-4 ${borderCol} p-4 rounded-lg shadow-xl flex items-start gap-3 w-80 text-xs text-slate-300 pointer-events-auto transition-all duration-300 transform translate-y-2 opacity-0`;
      toast.innerHTML = `
        <i data-lucide="${icon}" class="w-5 h-5 ${iconCol} shrink-0"></i>
        <div>
          <h5 class="font-bold text-slate-100">${title}</h5>
          <p class="mt-0.5 text-slate-400">${message}</p>
        </div>
      `;

      container.appendChild(toast);
      lucide.createIcons();

      // Animación de entrada
      setTimeout(() => {
        toast.className = toast.className.replace("translate-y-2 opacity-0", "translate-y-0 opacity-100");
      }, 50);

      // Animación de salida y auto-remoción
      setTimeout(() => {
        toast.className = toast.className.replace("translate-y-0 opacity-100", "translate-y-2 opacity-0");
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }
  </script>
</body>
</html>
